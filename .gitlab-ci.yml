stages:
  - update
  - test
  - build
  - smoke

variables:
  NODE_VERSION: "22"

include:
  - project: 'coldforge/ci-templates'
    ref: main
    file: '/templates/kaniko-build.yml'
  - project: 'coldforge/ci-templates'
    ref: main
    file: '/templates/frontend-smoke.yml'

# Auto-update @cloistr/ui when triggered from upstream
update-dependency:
  stage: update
  image: node:${NODE_VERSION}-alpine
  rules:
    - if: '$UPSTREAM_TRIGGER == "true"'
  before_script:
    - corepack enable && corepack prepare pnpm@10.29.3 --activate
    - apk add --no-cache git openssh-client
    - git config --global user.email "ci@coldforge.xyz"
    - git config --global user.name "GitLab CI"
  script:
    - echo "Updating ${UPSTREAM_PACKAGE}..."
    - pnpm update ${UPSTREAM_PACKAGE}
    - |
      if git diff --quiet pnpm-lock.yaml; then
        echo "No changes to lockfile, already up to date"
      else
        echo "Lockfile updated, committing..."
        git add pnpm-lock.yaml package.json
        git commit -m "chore: Update ${UPSTREAM_PACKAGE} [auto]"
        git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_REF_NAME}
      fi

# Test and type-check (skip when triggered from upstream)
test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  rules:
    - if: '$UPSTREAM_TRIGGER == "true"'
      when: never
    - when: always
  before_script:
    - corepack enable && corepack prepare pnpm@10.29.3 --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm build
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .pnpm-store/

# Build container image via the shared template (runs on default branch +
# merge_request + renovate/* so Renovate MRs get a green build+smoke pipeline
# and can auto-merge; pushes :latest only on the default branch). The extra
# UPSTREAM_TRIGGER skip is preserved for the legacy upstream-trigger flow.
build:
  extends: .kaniko-build
  stage: build
  rules:
    - if: '$UPSTREAM_TRIGGER == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^renovate\// && $CI_OPEN_MERGE_REQUESTS == null'

# Smoke-test gate: load built image in real Chromium (with crypto.randomUUID polyfill)
smoke-test:
  extends: .smoke-test
  needs: ["build"]
